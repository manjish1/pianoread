<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PianoRead</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PianoRead">
<meta name="theme-color" content="#0d0d12">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d12;--s1:#16161f;--s2:#1d1d28;--b:#282838;--acc:#7c6ef9;--grn:#4ade80;--red:#f87171;--yel:#fbbf24;--txt:#e2e2f0;--dim:#6868a0;--ff:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
html,body{margin:0;padding:0}
body{height:100vh;overflow:hidden;display:flex;flex-direction:column;max-width:460px;margin:0 auto;background:var(--bg);color:var(--txt);font-family:var(--ff)}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:1px solid var(--b);gap:8px;flex-shrink:0}
.logo{font-size:16px;font-weight:700;white-space:nowrap}.logo em{color:var(--acc);font-style:normal}
/* Level badge in header */
.hdr-lvl{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0}
.hdr-lvl-name{font-size:11px;font-weight:700;color:var(--acc);white-space:nowrap;letter-spacing:.3px}
.hdr-xp-track{width:100%;max-width:90px;height:4px;background:var(--b);border-radius:4px;overflow:hidden}
.hdr-xp-fill{height:100%;background:linear-gradient(90deg,var(--acc),#a78bfa);border-radius:4px;transition:width .5s ease}
nav{display:flex;gap:3px;flex-shrink:0}
nav button{background:none;border:1px solid transparent;color:var(--dim);padding:5px 11px;border-radius:18px;font-size:12px;cursor:pointer;font-family:var(--ff)}
nav button.on{background:var(--s2);border-color:var(--b);color:var(--txt)}

#quiz{flex:1;height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;padding:12px 14px 24px;gap:10px}

/* Score row */
.score-row{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:10px 14px}
.score-main{display:flex;align-items:baseline;gap:4px;flex:1}
.score-num{font-size:26px;font-weight:800;color:var(--acc);line-height:1;transition:transform .15s}
.score-lbl{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.score-num.bump{transform:scale(1.35)}
.streak-pill{display:none;align-items:center;gap:5px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);border-radius:20px;padding:5px 10px}
.streak-pill.show{display:flex}
.streak-fire{font-size:16px;line-height:1}
.streak-val{font-size:14px;font-weight:800;color:var(--yel)}
.streak-lbl{font-size:10px;color:var(--yel);opacity:.8;font-weight:600;text-transform:uppercase}
.mult-badge{display:none;align-items:center;background:rgba(124,110,249,.15);border:1px solid rgba(124,110,249,.4);border-radius:16px;padding:5px 9px;font-size:12px;font-weight:800;color:var(--acc)}
.mult-badge.show{display:flex}

/* Stats */
.stats-wrap{display:flex;flex-direction:column;gap:6px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.stat{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:7px 4px;text-align:center}
.stat .n{font-size:20px;font-weight:700}.stat .l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.stat.c .n{color:var(--grn)}.stat.w .n{color:var(--red)}.stat.s .n{color:var(--yel)}
.reset-btn{align-self:flex-end;background:none;border:none;color:var(--dim);font-size:11px;cursor:pointer;font-family:var(--ff);padding:0}

/* Staff */
.staff-card{background:#fff;border-radius:14px;display:flex;flex-direction:column;align-items:center;padding:12px 8px 8px;min-height:165px;justify-content:center;transition:box-shadow .2s}
.staff-card.flash-ok{box-shadow:0 0 0 3px var(--grn)}
.staff-card.flash-bad{box-shadow:0 0 0 3px var(--red)}
#staff-render{display:flex;justify-content:center;width:100%}
.clef-tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:6px;padding:2px 10px;border-radius:10px}
.clef-tag.bass{background:#dce8ff;color:#2a4f9a}.clef-tag.treble{background:#e8dcff;color:#5530a0}

/* Feedback */
.fb{border-radius:10px;padding:12px 14px;font-size:14px;font-weight:600;text-align:center;display:none}
.fb.ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--grn)}
.fb.bad{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.fb.skip{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:var(--yel)}

/* Inputs */
.inputs{display:flex;flex-direction:column;gap:10px}
.fields{display:flex;gap:10px;justify-content:center;min-height:80px;align-items:center}
.fw{display:flex;flex-direction:column;align-items:center;gap:4px}
.fl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.ni{width:68px;height:68px;background:var(--s2);border:2px solid var(--b);border-radius:12px;color:var(--txt);font-size:28px;font-weight:700;text-align:center;outline:none;text-transform:uppercase;font-family:var(--ff)}
.ni:focus{border-color:var(--acc)}.ni.ok{border-color:var(--grn);background:rgba(74,222,128,.08)}.ni.bad{border-color:var(--red);background:rgba(248,113,113,.08)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.ni.shake{animation:shake .35s ease}
.chk{background:var(--acc);border:none;border-radius:11px;color:#fff;font-size:16px;font-weight:600;padding:14px;width:100%;cursor:pointer;font-family:var(--ff)}
.chk:disabled{opacity:.4}
.hint{font-size:12px;color:var(--dim);text-align:center}.hint strong{color:var(--yel)}

/* History */
#hist{display:none;flex:1;height:0;overflow-y:auto;padding:14px 16px 28px;flex-direction:column}
.no-hist{text-align:center;color:var(--dim);padding:48px 0;font-size:14px;line-height:1.7}
.dc{background:var(--s1);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:8px}
.dh{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none}
.dh:hover,.dh:active{background:var(--s2)}
.dd{font-size:13px;font-weight:600}.dm{display:flex;align-items:center;gap:8px}
.dchips{display:flex;gap:6px;font-size:12px}
.dcc{color:var(--grn)}.dcw{color:var(--red)}.dcs{color:var(--yel)}
.dpct{font-size:11px;color:var(--dim);background:var(--s2);padding:2px 7px;border-radius:10px}
.chev{color:var(--dim);font-size:11px;transition:transform .2s}.chev.open{transform:rotate(180deg)}
.ql{border-top:1px solid var(--b);display:none}.ql.open{display:block}
.qr{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--b)}
.qr:last-child{border-bottom:none}
.q-thumb{background:#fff;border-radius:8px;flex-shrink:0;width:90px;height:66px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.q-thumb svg{display:block}
.q-info{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
.q-notes{font-size:13px;font-weight:600}
.q-typed{font-size:11px;color:var(--dim)}
.q-badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:1px 7px;border-radius:8px;margin-top:1px}
.q-badge.correct{background:rgba(74,222,128,.15);color:var(--grn)}
.q-badge.wrong{background:rgba(248,113,113,.15);color:var(--red)}
.q-badge.skipped{background:rgba(251,191,36,.15);color:var(--yel)}

/* Confetti canvas */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:900}

/* Floating point popup */
#pt-popup{position:fixed;pointer-events:none;z-index:910;font-size:22px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.4);display:none;will-change:transform,opacity}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-70px);opacity:0}}
#pt-popup.anim{animation:floatUp .9s ease-out forwards}

/* Level up overlay */
#levelup-overlay{position:fixed;inset:0;z-index:950;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,13,18,.88);backdrop-filter:blur(6px)}
@keyframes zoomIn{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.lu-box{background:linear-gradient(135deg,var(--s2),#1a1a35);border:2px solid var(--acc);border-radius:24px;padding:36px 48px;text-align:center;animation:zoomIn .5s cubic-bezier(.175,.885,.32,1.275) forwards}
.lu-emoji{font-size:56px;line-height:1;margin-bottom:8px}
.lu-title{font-size:14px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.lu-name{font-size:32px;font-weight:800;color:var(--acc);margin-bottom:4px}
.lu-sub{font-size:13px;color:var(--dim)}

/* Pulse on level badge XP gain */
@keyframes xpPulse{0%,100%{opacity:1}50%{opacity:.5}}
.hdr-xp-fill.pulse{animation:xpPulse .4s ease}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div id="pt-popup"></div>
<div id="levelup-overlay">
  <div class="lu-box">
    <div class="lu-emoji" id="lu-emoji">🎉</div>
    <div class="lu-title">Level Up!</div>
    <div class="lu-name" id="lu-name">Novice</div>
    <div class="lu-sub" id="lu-sub">Keep it up!</div>
  </div>
</div>

<header>
  <div class="logo">Piano<em>Read</em></div>
  <div class="hdr-lvl" id="hdr-lvl">
    <div class="hdr-lvl-name" id="hdr-lvl-name">Beginner</div>
    <div class="hdr-xp-track"><div class="hdr-xp-fill" id="hdr-xp-fill" style="width:0%"></div></div>
  </div>
  <nav>
    <button class="on" id="nb-q" onclick="showView('quiz')">Quiz</button>
    <button id="nb-h" onclick="showView('hist')">History</button>
  </nav>
</header>

<div id="quiz">
  <!-- Live score + streak -->
  <div class="score-row">
    <div class="score-main">
      <span class="score-num" id="today-score">0</span>
      <span class="score-lbl">pts today</span>
    </div>
    <div class="streak-pill" id="streak-pill">
      <span class="streak-fire">🔥</span>
      <span class="streak-val" id="streak-val">0</span>
      <span class="streak-lbl">streak</span>
    </div>
    <div class="mult-badge" id="mult-badge">x1</div>
  </div>

  <!-- Correct / Wrong / Skipped -->
  <div class="stats-wrap">
    <div class="stats">
      <div class="stat c"><div class="n" id="sc">0</div><div class="l">Correct</div></div>
      <div class="stat w"><div class="n" id="sw">0</div><div class="l">Wrong</div></div>
      <div class="stat s"><div class="n" id="ss">0</div><div class="l">Skipped</div></div>
    </div>
    <button class="reset-btn" onclick="resetToday()">↺ Reset today's score</button>
  </div>

  <div class="staff-card" id="staff-card">
    <div id="staff-render"></div>
    <div class="clef-tag" id="ctag"></div>
  </div>
  <div class="fb" id="fb"></div>
  <div class="inputs">
    <div class="fields" id="fields"></div>
    <button class="chk" id="chk" onclick="handleBtn()">Check</button>
    <div class="hint" id="hint-txt">Type <strong>?</strong> in any field to reveal the answer</div>
  </div>
</div>
<div id="hist"></div>

<script>
var TREBLE_CHAR = '𝄞';
var BASS_CHAR   = '𝄢';

var BASS_POOL   = ['f/2','g/2','a/2','b/2','c/3','d/3','e/3','f/3','g/3','a/3','b/3','c/4'];
var TREBLE_POOL = ['c/4','d/4','e/4','f/4','g/4','a/4','b/4','c/5','d/5','e/5','f/5','g/5'];

var TREBLE_STEPS = {'c/4':-6,'d/4':-5,'e/4':-4,'f/4':-3,'g/4':-2,'a/4':-1,'b/4':0,'c/5':1,'d/5':2,'e/5':3,'f/5':4,'g/5':5};
var BASS_STEPS   = {'f/2':-5,'g/2':-4,'a/2':-3,'b/2':-2,'c/3':-1,'d/3':0,'e/3':1,'f/3':2,'g/3':3,'a/3':4,'b/3':5,'c/4':6};

// ─── Levels ───────────────────────────────────────────────────────────────────
var LEVELS = [
  {name:'Beginner',  emoji:'🎹', xp:0,    sub:'Just getting started!'},
  {name:'Novice',    emoji:'🎵', xp:100,  sub:'Notes are clicking!'},
  {name:'Student',   emoji:'🎶', xp:250,  sub:'Practice makes perfect.'},
  {name:'Musician',  emoji:'🎸', xp:500,  sub:'Sounding good!'},
  {name:'Performer', emoji:'🎤', xp:900,  sub:'Ready for the stage!'},
  {name:'Expert',    emoji:'🏅', xp:1500, sub:'Seriously impressive.'},
  {name:'Virtuoso',  emoji:'🌟', xp:2500, sub:'Near the top!'},
  {name:'Maestro',   emoji:'👑', xp:4000, sub:'Pure mastery.'}
];

function getLevelIdx(xp) {
  var idx = 0;
  for (var i = 1; i < LEVELS.length; i++) {
    if (xp >= LEVELS[i].xp) idx = i; else break;
  }
  return idx;
}

function getXPProgress(xp) {
  var idx = getLevelIdx(xp);
  if (idx >= LEVELS.length - 1) return 1;
  var cur = LEVELS[idx].xp, next = LEVELS[idx + 1].xp;
  return (xp - cur) / (next - cur);
}

// ─── Game storage (XP lives across days, score is today only) ─────────────────
var GAME_KEY = 'pianoread_game_v1';
function loadGame() {
  try {
    var g = JSON.parse(localStorage.getItem(GAME_KEY));
    if (!g) g = {};
    if (!g.xp) g.xp = 0;
    return g;
  } catch(e) { return {xp:0}; }
}
function saveGame(g) { try { localStorage.setItem(GAME_KEY, JSON.stringify(g)); } catch(e) {} }

// Session state
var streak = 0;
var sessionScore = 0;

// Multiplier based on streak
function getMult() {
  if (streak >= 7) return 3;
  if (streak >= 4) return 2;
  if (streak >= 2) return 1.5;
  return 1;
}

// ─── Gamification UI ──────────────────────────────────────────────────────────
function updateLevelUI() {
  var g = loadGame();
  var idx = getLevelIdx(g.xp);
  var lvl = LEVELS[idx];
  var pct = Math.round(getXPProgress(g.xp) * 100);
  document.getElementById('hdr-lvl-name').textContent = lvl.emoji + ' ' + lvl.name;
  var fill = document.getElementById('hdr-xp-fill');
  fill.style.width = pct + '%';
}

function updateScoreUI() {
  var el = document.getElementById('today-score');
  el.textContent = (sessionScore > 0 ? '+' : '') + sessionScore;
  el.style.color = sessionScore < 0 ? 'var(--red)' : sessionScore > 0 ? 'var(--grn)' : 'var(--acc)';

  var pill = document.getElementById('streak-pill');
  var mult = document.getElementById('mult-badge');
  if (streak >= 2) {
    pill.className = 'streak-pill show';
    document.getElementById('streak-val').textContent = streak;
    var m = getMult();
    mult.className = 'mult-badge show';
    mult.textContent = 'x' + m;
  } else {
    pill.className = 'streak-pill';
    mult.className = 'mult-badge';
  }
}

function bumpScore() {
  var el = document.getElementById('today-score');
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  setTimeout(function(){ el.classList.remove('bump'); }, 200);
}

// ─── Confetti ─────────────────────────────────────────────────────────────────
var confCanvas = document.getElementById('confetti-canvas');
var confCtx = confCanvas.getContext('2d');
var confParticles = [];
var confFrame = null;
var CONF_COLORS = ['#7c6ef9','#4ade80','#f87171','#fbbf24','#38bdf8','#fb7185','#a78bfa','#34d399'];

function launchConfetti() {
  confCanvas.width = window.innerWidth;
  confCanvas.height = window.innerHeight;
  confParticles = [];
  var cx = confCanvas.width / 2, cy = confCanvas.height * 0.45;
  for (var i = 0; i < 70; i++) {
    var angle = (Math.random() * 360) * Math.PI / 180;
    var spd = 4 + Math.random() * 9;
    confParticles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 4,
      color: CONF_COLORS[Math.floor(Math.random() * CONF_COLORS.length)],
      w: 5 + Math.random() * 7,
      h: 4 + Math.random() * 5,
      rot: Math.random() * 360,
      rotV: (Math.random() - .5) * 14,
      alpha: 1,
      decay: 0.016 + Math.random() * 0.012
    });
  }
  if (confFrame) cancelAnimationFrame(confFrame);
  drawConfetti();
}

function drawConfetti() {
  confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
  var alive = false;
  for (var i = 0; i < confParticles.length; i++) {
    var p = confParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.18;
    p.vx *= 0.99;
    p.rot += p.rotV;
    p.alpha -= p.decay;
    if (p.alpha > 0) {
      alive = true;
      confCtx.save();
      confCtx.globalAlpha = p.alpha;
      confCtx.translate(p.x, p.y);
      confCtx.rotate(p.rot * Math.PI / 180);
      confCtx.fillStyle = p.color;
      confCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      confCtx.restore();
    }
  }
  if (alive) confFrame = requestAnimationFrame(drawConfetti);
  else confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
}

// ─── Floating point popup ─────────────────────────────────────────────────────
function showPtPopup(pts, mult) {
  var el = document.getElementById('pt-popup');
  var text = (pts > 0 ? '+' : '') + pts;
  if (mult > 1) text += ' x' + mult + '!';
  el.textContent = text;
  el.style.color = pts > 0 ? '#4ade80' : '#f87171';
  el.style.fontSize = pts > 0 ? '24px' : '18px';
  // Position near staff card
  var card = document.getElementById('staff-card');
  var rect = card.getBoundingClientRect();
  el.style.left = (rect.left + rect.width/2 - 30) + 'px';
  el.style.top  = (rect.top + 30) + 'px';
  el.style.display = 'block';
  el.className = '';
  void el.offsetWidth;
  el.className = 'anim';
  setTimeout(function(){ el.style.display='none'; el.className=''; }, 950);
}

// ─── Level up overlay ─────────────────────────────────────────────────────────
function showLevelUp(lvl) {
  var el = document.getElementById('levelup-overlay');
  document.getElementById('lu-emoji').textContent = lvl.emoji;
  document.getElementById('lu-name').textContent  = lvl.name;
  document.getElementById('lu-sub').textContent   = lvl.sub;
  el.style.display = 'flex';
  setTimeout(function(){ el.style.display = 'none'; }, 2800);
}

// ─── Flash staff card ─────────────────────────────────────────────────────────
function flashCard(cls) {
  var card = document.getElementById('staff-card');
  card.classList.add(cls);
  setTimeout(function(){ card.classList.remove(cls); }, 400);
}

// ─── SVG builder ─────────────────────────────────────────────────────────────
function buildSVG(q, opts) {
  var W = opts.W, H = opts.H, LG = opts.lg, showClef = opts.showClef;
  var HALF = LG / 2;
  var TY   = Math.round(H * (showClef ? 0.24 : 0.20));
  var MY   = TY + 2 * LG;
  var CW   = showClef ? Math.round(W * 0.175) : 4;
  var NX   = CW + Math.round((W - CW) * (showClef ? 0.42 : 0.50));
  var SW   = showClef ? '1.2' : '0.9';
  var NRX  = showClef ? 7.0 : 5.0;
  var NRY  = showClef ? 5.0 : 3.6;
  var SL   = showClef ? 32  : 22;

  function sY(s) { return MY - s * HALF; }
  var smap = (q.clef === 'bass') ? BASS_STEPS : TREBLE_STEPS;
  function S(k) { return (k in smap) ? smap[k] : 0; }

  var out = '';
  var i, y, x1 = showClef ? (CW - 3) : 2;
  for (i = 0; i < 5; i++) {
    y = TY + i * LG;
    out += '<line x1="'+x1+'" y1="'+y+'" x2="'+(W-4)+'" y2="'+y+'" stroke="#222" stroke-width="'+SW+'"/>';
  }

  if (showClef) {
    var cf = 'Apple Symbols,Segoe UI Symbol,FreeSerif,serif';
    if (q.clef === 'treble') {
      var tf = Math.round(LG * 5.3), ty2 = TY + 4*LG + Math.round(LG * 0.7);
      out += '<text x="3" y="'+ty2+'" font-size="'+tf+'" fill="#222" font-family="'+cf+'">'+TREBLE_CHAR+'</text>';
    } else {
      var bf = Math.round(LG * 2.9), bx = Math.round(LG * 0.65);
      out += '<text x="'+bx+'" y="'+sY(2)+'" dominant-baseline="middle" font-size="'+bf+'" fill="#222" font-family="'+cf+'">'+BASS_CHAR+'</text>';
    }
  }

  var npos = [], j, k, s, np;
  for (j = 0; j < q.keys.length; j++) {
    k = q.keys[j]; s = S(k);
    npos.push({k:k, x:NX, y:sY(s), s:s});
  }
  if (npos.length === 2 && Math.abs(npos[0].s - npos[1].s) === 1) {
    var off = showClef ? 8 : 6;
    npos[0].x = NX - off; npos[1].x = NX + off;
  }

  var ldrDone = {}, lw = showClef ? 15 : 11, ls, ly;
  for (j = 0; j < npos.length; j++) {
    s = npos[j].s;
    if (s <= -6) { for (ls=-6;ls>=s;ls-=2){ly=sY(ls);if(!ldrDone[ly]){out+='<line x1="'+(NX-lw)+'" y1="'+ly+'" x2="'+(NX+lw)+'" y2="'+ly+'" stroke="#222" stroke-width="'+SW+'"/>';ldrDone[ly]=1;}}}
    else if (s >= 6) { for (ls=6;ls<=s;ls+=2){ly=sY(ls);if(!ldrDone[ly]){out+='<line x1="'+(NX-lw)+'" y1="'+ly+'" x2="'+(NX+lw)+'" y2="'+ly+'" stroke="#222" stroke-width="'+SW+'"/>';ldrDone[ly]=1;}}}
  }

  var avgS = 0;
  for (j = 0; j < npos.length; j++) avgS += npos[j].s;
  var stemUp = (avgS/npos.length) < 0;
  for (j = 0; j < npos.length; j++) {
    np = npos[j];
    out += '<ellipse cx="'+np.x+'" cy="'+np.y+'" rx="'+NRX+'" ry="'+NRY+'" fill="#222" transform="rotate(-14 '+np.x+' '+np.y+')"/>';
  }

  var minY=npos[0].y, maxY=npos[0].y, minX=npos[0].x, maxX=npos[0].x;
  for (j=1;j<npos.length;j++){
    if(npos[j].y<minY)minY=npos[j].y; if(npos[j].y>maxY)maxY=npos[j].y;
    if(npos[j].x<minX)minX=npos[j].x; if(npos[j].x>maxX)maxX=npos[j].x;
  }
  var sw2 = showClef ? '1.5' : '1.1', sx;
  if (stemUp) { sx=minX+NRX; out+='<line x1="'+sx+'" y1="'+(maxY-2)+'" x2="'+sx+'" y2="'+(minY-SL)+'" stroke="#222" stroke-width="'+sw2+'"/>'; }
  else        { sx=maxX-NRX; out+='<line x1="'+sx+'" y1="'+(minY+2)+'" x2="'+sx+'" y2="'+(maxY+SL)+'" stroke="#222" stroke-width="'+sw2+'"/>'; }

  return '<svg width="'+W+'" height="'+H+'" xmlns="http://www.w3.org/2000/svg">'+out+'</svg>';
}

function drawStaff(q) {
  var el = document.getElementById('staff-render');
  if (el) el.innerHTML = buildSVG(q, {W:310, H:148, lg:11, showClef:true});
}

// ─── Storage ──────────────────────────────────────────────────────────────────
var STORE_KEY = 'pianoread_v1';
function loadData() { try { return JSON.parse(localStorage.getItem(STORE_KEY))||{}; } catch(e){return{};} }
function saveData(d) { try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch(e){} }
function todayKey() { return new Date().toISOString().slice(0,10); }

function record(q, typed, outcome) {
  var d=loadData(), k=todayKey();
  if (!d[k]) d[k]={correct:0,wrong:0,skipped:0,questions:[]};
  d[k][outcome]++;
  d[k].questions.push({clef:q.clef, keys:q.keys, notes:q.letters, typed:typed, outcome:outcome, t:Date.now()});
  saveData(d); refreshStats();
}

function refreshStats() {
  var t=loadData()[todayKey()]||{correct:0,wrong:0,skipped:0};
  document.getElementById('sc').textContent=t.correct;
  document.getElementById('sw').textContent=t.wrong;
  document.getElementById('ss').textContent=t.skipped;
}

function resetToday() {
  if (!confirm('Reset today\'s score?')) return;
  var d=loadData(), k=todayKey();
  if (d[k]) { d[k].correct=0; d[k].wrong=0; d[k].skipped=0; d[k].questions=[]; saveData(d); }
  streak=0; sessionScore=0;
  refreshStats(); updateScoreUI();
}

// ─── Award points ─────────────────────────────────────────────────────────────
function awardPoints(outcome) {
  var pts = 0;
  var m = 1;
  if (outcome === 'correct') {
    m = getMult();
    pts = Math.round(10 * m);
    streak++;
    // XP gained (never lost)
    var g = loadGame();
    var oldIdx = getLevelIdx(g.xp);
    g.xp += pts;
    saveGame(g);
    var newIdx = getLevelIdx(g.xp);
    if (newIdx > oldIdx) {
      setTimeout(function(){ showLevelUp(LEVELS[newIdx]); }, 600);
    }
    updateLevelUI();
  } else if (outcome === 'wrong') {
    pts = -5;
    streak = 0;
  } else {
    streak = 0;
  }
  sessionScore += pts;
  showPtPopup(pts, pts > 0 ? m : 1);
  bumpScore();
  updateScoreUI();
}

// ─── Question generation ──────────────────────────────────────────────────────
var NOTE_ORDER='cdefgab';
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function letterOf(k){return k[0].toUpperCase();}
function sortKeys(keys){
  return keys.slice().sort(function(a,b){
    var oA=parseInt(a.split('/')[1],10), oB=parseInt(b.split('/')[1],10);
    if(oA!==oB) return oA-oB;
    return NOTE_ORDER.indexOf(a[0])-NOTE_ORDER.indexOf(b[0]);
  });
}
function genQ(){
  var clef=(Math.random()<0.7)?'bass':'treble';
  var pool=(clef==='bass')?BASS_POOL:TREBLE_POOL;
  var isChord=(Math.random()<0.4);
  var keys,a,b,t;
  if(isChord){
    var sh=pool.slice().sort(function(){return Math.random()-0.5;});
    a=sh[0]; b=sh[1]; t=0;
    while(a[0]===b[0]&&t++<10) b=pick(pool);
    keys=sortKeys([a,b]);
  } else { keys=[pick(pool)]; }
  return {clef:clef, keys:keys, letters:keys.map(letterOf), isChord:isChord};
}

// ─── State ────────────────────────────────────────────────────────────────────
var Q=null, awaitingNext=false;

// ─── Input fields ─────────────────────────────────────────────────────────────
function buildFields(q) {
  var c=document.getElementById('fields'); c.innerHTML='';
  var n=q.isChord?2:1;
  for (var i=0; i<n; i++) {
    !function(idx,total){
      var wrap=document.createElement('div'); wrap.className='fw';
      var lbl=document.createElement('div'); lbl.className='fl';
      lbl.textContent=(total===1)?'Note':('Note '+(idx+1));
      var inp=document.createElement('input');
      inp.type='text'; inp.className='ni'; inp.id='ni'+idx; inp.maxLength=1;
      inp.setAttribute('autocomplete','off'); inp.setAttribute('autocorrect','off');
      inp.setAttribute('spellcheck','false'); inp.setAttribute('inputmode','text');
      inp.addEventListener('input',function(){
        this.value=this.value.replace(/[^a-gA-G?]/g,'').toUpperCase();
        if(this.value.length===1&&this.value!=='?'&&idx<total-1){
          var nx=document.getElementById('ni'+(idx+1)); if(nx) nx.focus();
        }
      });
      inp.addEventListener('keydown',function(e){if(e.key==='Enter') handleBtn();});
      wrap.appendChild(lbl); wrap.appendChild(inp); c.appendChild(wrap);
    }(i,n);
  }
  setTimeout(function(){var f=document.getElementById('ni0');if(f)f.focus();},80);
}

// ─── Button handler ───────────────────────────────────────────────────────────
function handleBtn() {
  if (awaitingNext) { nextQ(); return; }
  submit();
}

function submit() {
  if (!Q) return;
  var inputs=document.querySelectorAll('.ni'), vals=[], i;
  for(i=0;i<inputs.length;i++) vals.push(inputs[i].value.trim().toUpperCase());

  // Skip
  for(i=0;i<vals.length;i++){
    if(vals[i]==='?'){
      showFb('skip','Answer: '+Q.letters.join(', '));
      record(Q,'?','skipped');
      awardPoints('skipped');
      goAwaitNext(); return;
    }
  }
  for(i=0;i<vals.length;i++){if(!vals[i]){inputs[i].focus();return;}}

  var correct=(vals.slice().sort().join('')===Q.letters.slice().sort().join(''));
  for(i=0;i<inputs.length;i++) inputs[i].classList.add(correct?'ok':'bad');

  if(correct){
    showFb('ok','✓ Correct!');
    record(Q,vals.join(','),'correct');
    awardPoints('correct');
    flashCard('flash-ok');
    launchConfetti();
  } else {
    showFb('bad','✗ Wrong — answer: '+Q.letters.join(', '));
    record(Q,vals.join(','),'wrong');
    awardPoints('wrong');
    flashCard('flash-bad');
    // Shake the inputs
    for(i=0;i<inputs.length;i++){
      (function(el){ el.classList.add('shake'); setTimeout(function(){el.classList.remove('shake');},400); })(inputs[i]);
    }
  }
  goAwaitNext();
}

function goAwaitNext() {
  awaitingNext=true;
  var btn=document.getElementById('chk');
  btn.textContent='Next →'; btn.disabled=false;
  var inputs=document.querySelectorAll('.ni');
  for(var i=0;i<inputs.length;i++) inputs[i].disabled=true;
  document.getElementById('hint-txt').style.visibility='hidden';
  btn.focus();
}

function showFb(type,msg){
  var el=document.getElementById('fb');
  el.className='fb '+type; el.textContent=msg; el.style.display='block';
}

function nextQ(){
  awaitingNext=false;
  var fb=document.getElementById('fb'); fb.style.display='none'; fb.className='fb';
  var btn=document.getElementById('chk'); btn.textContent='Check'; btn.disabled=false;
  document.getElementById('hint-txt').style.visibility='visible';
  Q=genQ(); drawStaff(Q); buildFields(Q);
  var tag=document.getElementById('ctag');
  tag.textContent=(Q.clef==='bass')?'Bass clef — left hand':'Treble clef — right hand';
  tag.className='clef-tag '+Q.clef;
}

// ─── History ──────────────────────────────────────────────────────────────────
function fmtDate(s){
  var p=s.split('-'), dt=new Date(+p[0],+p[1]-1,+p[2]);
  var now=new Date(); now.setHours(0,0,0,0);
  var df=Math.round((now-dt)/86400000);
  if(df===0) return 'Today'; if(df===1) return 'Yesterday';
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function renderHist(){
  var data=loadData(), el=document.getElementById('hist');
  var days=Object.keys(data).sort().reverse();
  if(!days.length){el.innerHTML='<div class="no-hist">No history yet.<br>Complete some questions to see your progress.</div>';return;}
  el.innerHTML='';
  var di;
  for(di=0;di<days.length;di++){
    !function(day){
      var d=data[day], tot=d.correct+d.wrong;
      var pct=tot?Math.round(d.correct/tot*100):0;
      var card=document.createElement('div'); card.className='dc';
      var head=document.createElement('div'); head.className='dh';
      head.innerHTML=
        '<div class="dd">'+fmtDate(day)+'</div>'+
        '<div class="dm"><div class="dchips"><span class="dcc">'+d.correct+'✓</span> <span class="dcw">'+d.wrong+'✗</span> <span class="dcs">'+d.skipped+'?</span></div>'+
        '<div class="dpct">'+pct+'%</div><span class="chev" id="cv-'+day+'">▼</span></div>';
      var ql=document.createElement('div'); ql.className='ql'; ql.id='ql-'+day;
      var qi, q2, row, thumb, info;
      for(qi=0;qi<d.questions.length;qi++){
        q2=d.questions[qi];
        row=document.createElement('div'); row.className='qr';
        thumb=document.createElement('div'); thumb.className='q-thumb';
        if(q2.keys&&q2.keys.length){
          thumb.innerHTML=buildSVG({clef:q2.clef,keys:q2.keys},{W:90,H:66,lg:7,showClef:true});
        } else {
          thumb.style.cssText='font-size:13px;font-weight:700;color:#555;flex-direction:column;gap:2px;';
          thumb.innerHTML='<span>'+q2.notes.join('</span><span>')+'</span>';
        }
        info=document.createElement('div'); info.className='q-info';
        var notesEl=document.createElement('div'); notesEl.className='q-notes';
        notesEl.textContent=q2.notes.join(', ');
        var typedEl=document.createElement('div'); typedEl.className='q-typed';
        typedEl.textContent=(q2.typed==='?')?'skipped':'you typed: '+q2.typed;
        var badge=document.createElement('div'); badge.className='q-badge '+q2.outcome;
        badge.textContent=q2.outcome;
        info.appendChild(notesEl); info.appendChild(typedEl); info.appendChild(badge);
        row.appendChild(thumb); row.appendChild(info); ql.appendChild(row);
      }
      head.onclick=function(){
        var open=ql.classList.toggle('open');
        var chev=document.getElementById('cv-'+day); if(chev) chev.classList.toggle('open',open);
      };
      card.appendChild(head); card.appendChild(ql); el.appendChild(card);
    }(days[di]);
  }
}

// ─── View switch ──────────────────────────────────────────────────────────────
function showView(v){
  var qEl=document.getElementById('quiz'), hEl=document.getElementById('hist');
  document.getElementById('nb-q').classList.toggle('on',v==='quiz');
  document.getElementById('nb-h').classList.toggle('on',v==='hist');
  if(v==='quiz'){
    qEl.style.display='flex'; hEl.style.display='none';
    setTimeout(function(){var f=document.getElementById('ni0');if(f)f.focus();},60);
  } else {
    qEl.style.display='none';
    var headerH=document.querySelector('header').offsetHeight;
    hEl.style.display='block';
    hEl.style.height=(window.innerHeight-headerH)+'px';
    renderHist();
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
refreshStats();
updateLevelUI();
updateScoreUI();
nextQ();
</script>
